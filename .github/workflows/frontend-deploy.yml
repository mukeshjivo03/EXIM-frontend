name: Deploy React App

on:
  push:
    branches:
      - production

# Don't let two deploys (pull + reset + build) overlap on the server.
concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # The build runs ON the target server (it already has Node 22 and the repo
      # cloned at DEPLOY_DIR). We only open a single SSH command session — the same
      # kind that already connects reliably — and never push bytes into the server's
      # public, brute-force-flooded SSH port. All network here is outbound from the
      # server (git fetch + npm registry over HTTPS), which is fast and reliable.
      - name: Pull, build and reload on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30s
          command_timeout: 15m
          envs: VITE_API_BASE_URL
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/superadmin/exim/EXIM-frontend"
            cd "${DEPLOY_DIR}"

            # Sync the working tree to the pushed commit on production.
            git fetch --depth 1 origin production
            git reset --hard origin/production

            # Install exactly what package-lock pins, then build (dist/ is the nginx root).
            # The server's local .env supplies all VITE_* vars; the secret below overrides
            # VITE_API_BASE_URL to match CI configuration.
            npm ci
            VITE_API_BASE_URL="${VITE_API_BASE_URL}" npm run build

            # Validate and reload nginx (superadmin has passwordless sudo for these).
            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deployed $(git rev-parse --short HEAD) at $(date -u +%FT%TZ)"
